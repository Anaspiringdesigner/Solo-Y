name: biofeedback_app
description: Biofeedback TD Display App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Video streaming
  media_kit:                    ^1.1.11
  media_kit_video:              ^1.2.4
  media_kit_libs_android_video: ^1.3.2

  # Charts
  fl_chart:                     ^0.68.0

  # State management
  provider:                     ^6.1.2

  # HTTP
  http:                         ^1.2.0

  # Calendar
  googleapis:                   ^13.2.0
  googleapis_auth:               ^1.6.0
  google_sign_in:                ^6.2.1

  # Background service
  flutter_background_service:         ^5.0.5
  flutter_background_service_android: ^6.2.2

  # Permissions + file access
  permission_handler:           ^11.3.1
  path_provider:                ^2.1.3

  # Camera + mjpeg
  camera:                       ^0.11.0
  shelf:                        ^1.4.1
  shelf_router:                 ^1.1.4

  # UI
  google_fonts:                 ^6.2.1
  animate_do:                   ^3.3.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints:                ^3.0.0

flutter:
  uses-material-design: true