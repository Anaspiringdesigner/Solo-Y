name: biofeedback_app
description: Biofeedback TD Display App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Video streaming
  video_player:           ^2.8.2

  # Charts
  fl_chart:               ^0.68.0

  # State management
  provider:               ^6.1.2

  # HTTP
  http:                   ^1.2.0

  # Calendar
  googleapis:             ^13.2.0
  googleapis_auth:        ^1.6.0
  google_sign_in:         ^6.2.1

  # UI
  google_fonts:           ^6.2.1
  animate_do:             ^3.3.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints:          ^3.0.0

flutter:
  uses-material-design: true