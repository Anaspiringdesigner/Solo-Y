// 1. ADD THIS AT THE VERY TOP
repositories {
    mavenCentral()
    maven { url 'https://jitpack.io' }
}

// ... existing buildscript and android blocks ...

// 2. UPDATE THIS AT THE BOTTOM
dependencies {
  implementation project(':expo-modules-core')
  implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:${getKotlinVersion()}"

  // Add the Polar SDK and RxJava dependencies
  implementation 'com.github.polarofficial:polar-ble-sdk:5.17.0'
  implementation 'io.reactivex.rxjava3:rxjava:3.1.6'
  implementation 'io.reactivex.rxjava3:rxandroid:3.0.2'
}

plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'expo.modules.polarble'
version = '0.7.9'

android {
  namespace "expo.modules.polarble"
  defaultConfig {
    versionCode 1
    versionName "0.7.9"
  }
  lintOptions {
    abortOnError false
  }
}
